services:
  spola-backend-api:
    image: spola-backend:local
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /spola-backend
    environment:
      SPOLA_API_KEY: ${SPOLA_API_KEY}
    command:
      [
        "./spola-backend-cli/build/install/spola/bin/spola",
        "--api",
        "--api-port",
        "8082",
        "--dir",
        "/spola-backend/workspace",
      ]
    env_file:
      - .env
    volumes:
      - ./.spola:/spola-backend/.spola
      - ./workspace:/spola-backend/workspace
    ports:
      - "127.0.0.1:8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  spola-backend-mcp:
    image: spola-backend:local
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /spola-backend
    environment:
      SPOLA_API_KEY: ${SPOLA_API_KEY}
    command:
      [
        "./spola-backend-cli/build/install/spola/bin/spola",
        "--mcp",
        "--mcp-transport",
        "sse",
        "--mcp-host",
        "0.0.0.0",
        "--mcp-port",
        "8091",
        "--dir",
        "/spola-backend/workspace",
      ]
    env_file:
      - .env
    volumes:
      - ./.spola:/spola-backend/.spola
      - ./workspace:/spola-backend/workspace
    ports:
      - "127.0.0.1:8091:8091"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8091/mcp || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
